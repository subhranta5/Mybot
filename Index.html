<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Universal AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex">

<!-- Sidebar -->
<div id="sidebar" class="w-72 bg-white border-r flex flex-col">
  <div class="p-4 border-b flex justify-between items-center">
    <h2 class="text-lg font-semibold">Chats</h2>
    <button onclick="newChat()" class="text-sm bg-blue-500 text-white px-2 py-1 rounded">New</button>
  </div>
  <div id="chatList" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
  <div class="p-4 border-t">
    <button onclick="openSettings()" class="w-full bg-gray-200 p-2 rounded text-sm">⚙ Settings</button>
  </div>
</div>

<!-- Main Chat Area -->
<div class="flex-1 flex flex-col">

  <div class="p-4 border-b bg-white">
    <h1 class="text-xl font-semibold">Universal AI Chat</h1>
  </div>

  <div id="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <div class="p-4 bg-white border-t">
    <div class="flex space-x-2">
      <input id="messageInput" type="text" placeholder="Type a message..."
        class="flex-1 border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <button onclick="sendMessage()" 
        class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">
        Send
      </button>
    </div>
  </div>

</div>

<!-- Settings Modal -->
<div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
  <div class="bg-white w-96 p-6 rounded shadow-lg">
    <h2 class="text-lg font-semibold mb-4">Settings</h2>

    <label class="block text-sm mb-1">OpenRouter API Key</label>
    <input id="apiKeyInput" type="password" class="w-full border px-3 py-2 rounded mb-4">

    <label class="block text-sm mb-1">Model Name</label>
    <input id="modelInput" type="text" class="w-full border px-3 py-2 rounded mb-4"
      placeholder="e.g. openai/gpt-4o-mini">

    <div class="flex justify-end space-x-2">
      <button onclick="closeSettings()" class="px-4 py-2 bg-gray-200 rounded">Cancel</button>
      <button onclick="saveSettings()" class="px-4 py-2 bg-blue-500 text-white rounded">Save</button>
    </div>
  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats")) || {};
let currentChatId = null;

function saveToStorage() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

function newChat() {
  const id = "chat_" + Date.now();
  chats[id] = [];
  currentChatId = id;
  saveToStorage();
  renderChatList();
  renderMessages();
}

function renderChatList() {
  const chatList = document.getElementById("chatList");
  chatList.innerHTML = "";
  Object.keys(chats).forEach(id => {
    const div = document.createElement("div");
    div.className = "p-2 bg-gray-100 rounded cursor-pointer hover:bg-gray-200 text-sm";
    div.innerText = id;
    div.onclick = () => {
      currentChatId = id;
      renderMessages();
    };
    chatList.appendChild(div);
  });
}

function renderMessages() {
  const container = document.getElementById("chatMessages");
  container.innerHTML = "";
  if (!currentChatId) return;

  chats[currentChatId].forEach(msg => {
    const div = document.createElement("div");
    div.className = msg.role === "user" 
      ? "text-right" 
      : "text-left";
    div.innerHTML = `
      <div class="inline-block px-4 py-2 rounded-lg max-w-xl 
        ${msg.role === "user" 
          ? "bg-blue-500 text-white" 
          : "bg-gray-200 text-gray-800"}">
        ${msg.content}
      </div>
    `;
    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text || !currentChatId) return;

  chats[currentChatId].push({ role: "user", content: text });
  renderMessages();
  input.value = "";
  saveToStorage();

  const apiKey = localStorage.getItem("openrouter_api_key");
  const model = localStorage.getItem("model_name");

  if (!apiKey || !model) {
    alert("Please configure API Key and Model in Settings.");
    return;
  }

  const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + apiKey,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: model,
      messages: chats[currentChatId]
    })
  });

  const data = await response.json();
  const reply = data.choices?.[0]?.message?.content || "Error occurred.";

  chats[currentChatId].push({ role: "assistant", content: reply });
  saveToStorage();
  renderMessages();
}

function openSettings() {
  document.getElementById("settingsModal").classList.remove("hidden");
  document.getElementById("settingsModal").classList.add("flex");
  document.getElementById("apiKeyInput").value = localStorage.getItem("openrouter_api_key") || "";
  document.getElementById("modelInput").value = localStorage.getItem("model_name") || "";
}

function closeSettings() {
  document.getElementById("settingsModal").classList.add("hidden");
  document.getElementById("settingsModal").classList.remove("flex");
}

function saveSettings() {
  const apiKey = document.getElementById("apiKeyInput").value;
  const model = document.getElementById("modelInput").value;
  localStorage.setItem("openrouter_api_key", apiKey);
  localStorage.setItem("model_name", model);
  closeSettings();
  alert("Settings Saved!");
}

renderChatList();
if (!currentChatId && Object.keys(chats).length > 0) {
  currentChatId = Object.keys(chats)[0];
}
if (!currentChatId) newChat();
renderMessages();
</script>

</body>
</html>
